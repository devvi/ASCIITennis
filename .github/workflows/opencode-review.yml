name: opencode-review
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
      - run: |
          git config user.name "opencode-agent[bot]"
          git config user.email "opencode-agent[bot]@users.noreply.github.com"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Run tests
        id: test
        run: |
          npm test &> test-output.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Remove test output before opencode steps
        run: rm -f test-output.log

      - name: Fix failing tests
        if: steps.test.outputs.exit_code != '0'
        uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true
          prompt: |
            Tests are failing on this branch. Run `npm test` to see the
            full test output. Fix ALL failures so `npm test` passes.
            After fixing, run `npm test` again to verify.
            Commit and push the fixes to the same branch.
            Do NOT create a new PR.

      - name: Review & fix critical issues
        if: steps.test.outputs.exit_code == '0'
        uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true
          prompt: |
            Review this pull request for critical issues:
            - Potential bugs or logic errors?
            - Security vulnerabilities?
            - Implementation match documented intent?
            - Test coverage adequate? (TDD mandatory)

            Fix any critical issues found (bugs, security, logic errors).
            After fixing, run `npm test` to verify.
            Commit and push fixes to the same branch. Do NOT create a new PR.

            If no critical issues found, just post a normal code review
            covering code quality, edge cases, and improvement suggestions.
