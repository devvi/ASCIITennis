name: opencode
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_target:
    types: [closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  research-on-issue-opened:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - run: |
          git config user.name "opencode-agent[bot]"
          git config user.email "opencode-agent[bot]@users.noreply.github.com"
      - uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true
          prompt: |
            Research this issue. Read the issue title and body, create PRD
            and TASK documents in docs/PRD/ and docs/TASKS/, commit and push
            them, then create a research PR with the findings. Do NOT close the
            parent issue with Closes/Fixes/Resolves.

  handle-comment-command:
    if: |
      (github.event_name == 'issue_comment' && contains(format(' {0} ', github.event.comment.body), ' /opencode ')) ||
      (github.event_name == 'pull_request_review_comment' && contains(format(' {0} ', github.event.comment.body), ' /oc '))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - run: |
          git config user.name "opencode-agent[bot]"
          git config user.email "opencode-agent[bot]@users.noreply.github.com"
      - uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true

  on-research-pr-merged:
    if: >
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'Research:')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Extract parent issue and post /opencode plan comment
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ "$PR_TITLE" =~ \#([0-9]+)\)$ ]]; then
            PARENT="${BASH_REMATCH[1]}"
            echo "Posting /opencode plan to issue #$PARENT"
            gh issue comment "$PARENT" --body "/opencode plan this"
          else
            echo "Could not extract parent issue number from title: $PR_TITLE"
            exit 1
          fi

  on-plan-pr-merged:
    if: >
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'Plan:')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Extract parent issue and post /opencode implement comment
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ "$PR_TITLE" =~ \#([0-9]+)\)$ ]]; then
            PARENT="${BASH_REMATCH[1]}"
            echo "Posting /opencode implement to issue #$PARENT"
            gh issue comment "$PARENT" --body "/opencode implement this"
          else
            echo "Could not extract parent issue number from title: $PR_TITLE"
            exit 1
          fi
