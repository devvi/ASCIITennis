name: opencode
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/opencode')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '/oc'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - run: |
          git config user.name "opencode-agent[bot]"
          git config user.email "opencode-agent[bot]@users.noreply.github.com"
      - uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true
