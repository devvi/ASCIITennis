name: opencode
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_target:
    types: [closed]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  research-on-issue-opened:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - run: |
          git config user.name "opencode-agent[bot]"
          git config user.email "opencode-agent[bot]@users.noreply.github.com"
      - uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true
          prompt: |
            Research this issue. Read the issue title and body, create PRD
            and TASK documents in docs/PRD/ and docs/TASKS/, commit and push
            them, then create a research PR with the findings. Do NOT close the
            parent issue with Closes/Fixes/Resolves.
            IMPORTANT: The research PR title MUST follow this exact format:
            "Research: <feature-name> (parent #<issue-number>)"
            For example: "Research: UI optimization (parent #161)"
            This is required for the auto-chain workflow to detect and
            trigger the plan phase after merge. Do NOT use other prefixes
            like "Issue:" or "Feature:".

  handle-comment-command:
    if: |
      (github.event_name == 'issue_comment' && contains(format(' {0} ', github.event.comment.body), ' /opencode ')) ||
      (github.event_name == 'pull_request_review_comment' && contains(format(' {0} ', github.event.comment.body), ' /oc '))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - run: |
          git config user.name "opencode-agent[bot]"
          git config user.email "opencode-agent[bot]@users.noreply.github.com"
      - uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true

  on-research-pr-merged:
    if: >
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'Research')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - run: |
          git config user.name "opencode-agent[bot]"
          git config user.email "opencode-agent[bot]@users.noreply.github.com"
      - uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true
          prompt: |
            Read the PRD and TASK docs from docs/PRD/ and docs/TASKS/.
            Execute the plan phase: create DESIGN document in docs/DESIGN/,
            append phases to docs/TASKS/, create a plan issue, commit and push,
            then create a plan PR.
            IMPORTANT: The plan PR title MUST follow this exact format:
            "Plan: <feature-name> (parent #<issue-number>)"
            Do NOT use Closes/Fixes/Resolves for the parent issue.
      - name: Enable auto-merge on plan PR
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          PARENT=$(echo "${{ github.event.pull_request.title }}" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
          sleep 5
          PLAN_PR=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --json number,title,createdAt \
            --jq 'map(select(.title | test("^Plan") and test("#'"$PARENT"'"))) | sort_by(.createdAt) | last | .number')
          if [ -n "$PLAN_PR" ] && [ "$PLAN_PR" != "null" ]; then
            echo "Enabling auto-merge on plan PR #$PLAN_PR"
            gh pr merge "$PLAN_PR" --repo "$GITHUB_REPOSITORY" --auto --merge
          else
            echo "No plan PR found for parent #$PARENT"
            exit 1
          fi

  on-plan-pr-merged:
    if: >
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'Plan')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Extract parent issue and post /opencode implement comment
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ "$PR_TITLE" =~ \#([0-9]+) ]]; then
            PARENT="${BASH_REMATCH[1]}"
            echo "Posting /opencode implement to issue #$PARENT"
            gh issue comment "$PARENT" --repo "$GITHUB_REPOSITORY" --body "/opencode implement this"
          else
            echo "Could not extract parent issue number from title: $PR_TITLE"
            exit 1
          fi

  on-merge-push:
    if: >
      github.event_name == 'push' &&
      github.event.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Detect merge commit and advance auto-chain
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          COMMIT_MSG=$(jq -r '.head_commit.message // empty' "$GITHUB_EVENT_PATH")
          if [ -z "$COMMIT_MSG" ]; then
            echo "No head_commit found, skipping"
            exit 0
          fi
          PR_NUM=$(echo "$COMMIT_MSG" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
          if [ -z "$PR_NUM" ]; then
            echo "Not a merge commit (no PR number found), skipping"
            exit 0
          fi
          echo "Detected merged PR #$PR_NUM"
          PR_TITLE=$(gh pr view "$PR_NUM" --repo "$GITHUB_REPOSITORY" --json title --jq '.title' 2>/dev/null)
          if [ -z "$PR_TITLE" ]; then
            echo "Could not fetch PR #$PR_NUM details, skipping"
            exit 0
          fi
          echo "PR title: $PR_TITLE"
          PARENT=$(echo "$PR_TITLE" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
          if [ -z "$PARENT" ]; then
            echo "Could not extract parent issue number from title: $PR_TITLE"
            exit 0
          fi
          if [[ "$PR_TITLE" == Research* ]]; then
            echo "Posting /opencode plan to parent issue #$PARENT"
            gh issue comment "$PARENT" --repo "$GITHUB_REPOSITORY" --body "/opencode plan this"
          elif [[ "$PR_TITLE" == Plan* ]]; then
            echo "Posting /opencode implement to parent issue #$PARENT"
            gh issue comment "$PARENT" --repo "$GITHUB_REPOSITORY" --body "/opencode implement this"
          else
            echo "PR #$PR_NUM is neither Research nor Plan, skipping"
          fi
