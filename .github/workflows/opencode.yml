name: opencode
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_target:
    types: [closed]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  research-on-issue-opened:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - run: |
          git config user.name "opencode-agent[bot]"
          git config user.email "opencode-agent[bot]@users.noreply.github.com"
      - uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          PARENT_ISSUE: ${{ github.event.issue.number }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true
          prompt: |
            Research this issue. Read the issue title and body, create PRD
            and TASK documents in docs/PRD/ and docs/TASKS/, commit and push
            them, then create a research PR with the findings. Do NOT close the
            parent issue with Closes/Fixes/Resolves.
            The actual parent issue number is ${{ env.PARENT_ISSUE }}.
            IMPORTANT: The research PR title MUST follow this exact format:
            "Research: <feature-name> (parent #${{ env.PARENT_ISSUE }})"
            For example: "Research: UI optimization (parent #161)"
            This is required for the auto-chain workflow to detect and
            trigger the plan phase after merge. Do NOT use other prefixes
            like "Issue:" or "Feature:". Use ${{ env.PARENT_ISSUE }} as the issue number, do not guess or hallucinate it.
      - name: Validate and fix research PR title
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          sleep 5
          RESEARCH_PR=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --json number,title,headRefName \
            --jq 'map(select(.headRefName | test("opencode/issue'"$ISSUE_NUM"'"))) | last | .number')
          if [ -z "$RESEARCH_PR" ] || [ "$RESEARCH_PR" = "null" ]; then
            echo "No research PR found for issue #$ISSUE_NUM, skipping validation"
            exit 0
          fi
          CURRENT_TITLE=$(gh pr view "$RESEARCH_PR" --repo "$GITHUB_REPOSITORY" --json title --jq '.title')
          if [[ "$CURRENT_TITLE" == Research:* ]] || [[ "$CURRENT_TITLE" == Research\ * ]]; then
            echo "Research PR title is valid: '$CURRENT_TITLE'"
          else
            echo "Fixing research PR #$RESEARCH_PR title (current: '$CURRENT_TITLE')"
            NEW_TITLE="Research: $CURRENT_TITLE (parent #$ISSUE_NUM)"
            gh pr edit "$RESEARCH_PR" --repo "$GITHUB_REPOSITORY" --title "$NEW_TITLE"
          fi

  handle-comment-command:
    if: |
      (github.event_name == 'issue_comment' && contains(format(' {0} ', github.event.comment.body), ' /opencode ')) ||
      (github.event_name == 'pull_request_review_comment' && contains(format(' {0} ', github.event.comment.body), ' /oc '))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - run: |
          git config user.name "opencode-agent[bot]"
          git config user.email "opencode-agent[bot]@users.noreply.github.com"
      - uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true

  on-research-pr-merged:
    if: >
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'Research')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    outputs:
      parent: ${{ steps.extract-parent.outputs.parent }}
    steps:
      - name: Extract parent issue number
        id: extract-parent
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ "$PR_TITLE" =~ \#([0-9]+) ]]; then
            echo "parent=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "Could not extract parent issue number from title: $PR_TITLE"
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - run: |
          git config user.name "opencode-agent[bot]"
          git config user.email "opencode-agent[bot]@users.noreply.github.com"
      - uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          PARENT_ISSUE: ${{ steps.extract-parent.outputs.parent }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true
          prompt: |
            Read the PRD and TASK docs from docs/PRD/ and docs/TASKS/.
            Execute the plan phase for parent issue #${{ env.PARENT_ISSUE }}:
            create DESIGN document in docs/DESIGN/,
            append phases to docs/TASKS/, create a plan issue, commit and push,
            then create a plan PR.
            IMPORTANT: The plan PR title MUST follow this exact format:
            "Plan: <feature-name> (parent #${{ env.PARENT_ISSUE }})"
            The plan PR body MUST NOT contain "Closes", "Fixes", or "Resolves"
            for #${{ env.PARENT_ISSUE }}. Use "Parent: #${{ env.PARENT_ISSUE }}" instead.
      - name: Validate plan PR title
        id: validate-plan
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          PARENT: ${{ steps.extract-parent.outputs.parent }}
        run: |
          sleep 5
          PLAN_PR=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --json number,title,createdAt,headRefName \
            --jq 'map(select(.headRefName | test("opencode/issue'"$PARENT"'"))) | sort_by(.createdAt) | last | .number')
          if [ -z "$PLAN_PR" ] || [ "$PLAN_PR" = "null" ]; then
            echo "No plan PR found for parent #$PARENT"
            exit 1
          fi
          echo "plan_pr=$PLAN_PR" >> "$GITHUB_OUTPUT"
          CURRENT_TITLE=$(gh pr view "$PLAN_PR" --repo "$GITHUB_REPOSITORY" --json title --jq '.title')
          if [[ "$CURRENT_TITLE" == Plan:* ]] || [[ "$CURRENT_TITLE" == Plan\ * ]]; then
            echo "Plan PR title is valid: '$CURRENT_TITLE'"
          else
            echo "Fixing plan PR #$PLAN_PR title (current: '$CURRENT_TITLE')"
            if [[ "$CURRENT_TITLE" =~ \(parent\ #([0-9]+)\) ]]; then
              NEW_TITLE="Plan: $CURRENT_TITLE"
            else
              NEW_TITLE="Plan: $CURRENT_TITLE (parent #$PARENT)"
            fi
            gh pr edit "$PLAN_PR" --repo "$GITHUB_REPOSITORY" --title "$NEW_TITLE"
          fi
      - name: Enable auto-merge on plan PR
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          PLAN_PR: ${{ steps.validate-plan.outputs.plan_pr }}
        run: |
          echo "Enabling auto-merge on plan PR #$PLAN_PR"
          gh pr merge "$PLAN_PR" --repo "$GITHUB_REPOSITORY" --auto --merge

  on-plan-pr-merged:
    if: >
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'Plan')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Extract parent issue from PR body and post /opencode implement comment
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json body --jq '.body // ""')
          PARENT=""
          if [[ "$PR_BODY" =~ [Pp]arent:\ *#([0-9]+) ]]; then
            PARENT="${BASH_REMATCH[1]}"
          elif [[ "$PR_BODY" =~ [Pp]arent\ *#([0-9]+) ]]; then
            PARENT="${BASH_REMATCH[1]}"
          fi
          if [ -z "$PARENT" ]; then
            echo "Could not extract parent issue from PR body, falling back to title"
            PR_TITLE="${{ github.event.pull_request.title }}"
            if [[ "$PR_TITLE" =~ \#([0-9]+) ]]; then
              PARENT="${BASH_REMATCH[1]}"
            fi
          fi
          if [ -n "$PARENT" ]; then
            echo "Posting /opencode implement to parent issue #$PARENT"
            gh issue comment "$PARENT" --repo "$GITHUB_REPOSITORY" --body "/opencode implement this"
          else
            echo "Could not extract parent issue number from PR #$PR_NUMBER"
            exit 1
          fi

  on-merge-push:
    if: >
      github.event_name == 'push' &&
      github.event.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Detect merge commit and advance auto-chain
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          COMMIT_MSG=$(jq -r '.head_commit.message // empty' "$GITHUB_EVENT_PATH")
          if [ -z "$COMMIT_MSG" ]; then
            echo "No head_commit found, skipping"
            exit 0
          fi
          PR_NUM=$(echo "$COMMIT_MSG" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
          if [ -z "$PR_NUM" ]; then
            echo "Not a merge commit (no PR number found), skipping"
            exit 0
          fi
          echo "Detected merged PR #$PR_NUM"
          PR_INFO=$(gh pr view "$PR_NUM" --repo "$GITHUB_REPOSITORY" --json title,body --jq '{title: .title, body: (.body // "")}' 2>/dev/null)
          if [ -z "$PR_INFO" ]; then
            echo "Could not fetch PR #$PR_NUM details, skipping"
            exit 0
          fi
          PR_TITLE=$(echo "$PR_INFO" | jq -r '.title')
          PR_BODY=$(echo "$PR_INFO" | jq -r '.body')
          echo "PR title: $PR_TITLE"
          PARENT=""
          if [[ "$PR_BODY" =~ [Pp]arent:\ *#([0-9]+) ]]; then
            PARENT="${BASH_REMATCH[1]}"
          elif [[ "$PR_TITLE" =~ \#([0-9]+) ]]; then
            PARENT="${BASH_REMATCH[1]}"
          fi
          if [ -z "$PARENT" ]; then
            echo "Could not extract parent issue number from PR #$PR_NUM"
            exit 0
          fi
          PR_BRANCH=$(gh pr view "$PR_NUM" --repo "$GITHUB_REPOSITORY" --json headRefName --jq '.headRefName' 2>/dev/null)
          if [[ "$PR_TITLE" == Research* ]] || [[ "$PR_TITLE" == \#* ]]; then
            echo "Posting /opencode plan to parent issue #$PARENT"
            gh issue comment "$PARENT" --repo "$GITHUB_REPOSITORY" --body "/opencode plan this"
            echo "Waiting for plan PR creation and enabling auto-merge..."
            sleep 15
            PLAN_PR=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --json number,headRefName,createdAt \
              --jq 'map(select(.headRefName | test("opencode/issue'"$PARENT"'"))) | sort_by(.createdAt) | last | .number')
            if [ -n "$PLAN_PR" ] && [ "$PLAN_PR" != "null" ]; then
              echo "Enabling auto-merge on plan PR #$PLAN_PR"
              gh pr merge "$PLAN_PR" --repo "$GITHUB_REPOSITORY" --auto --merge
            else
              echo "No plan PR found for parent #$PARENT yet, skipping auto-merge"
            fi
          elif [[ "$PR_TITLE" == Plan* ]]; then
            echo "Posting /opencode implement to parent issue #$PARENT"
            gh issue comment "$PARENT" --repo "$GITHUB_REPOSITORY" --body "/opencode implement this"
          elif [[ "$PR_BRANCH" == opencode/issue* ]]; then
            if [[ "$PR_BODY" == *"Parent:"* ]] || [[ "$PR_BODY" == *"Phase 1:"* ]]; then
              echo "Detected plan PR by body content, posting /opencode implement"
              gh issue comment "$PARENT" --repo "$GITHUB_REPOSITORY" --body "/opencode implement this"
            elif [[ "$PR_BODY" == *"Research"* ]] || [[ "$PR_BODY" == *"findings"* ]]; then
              echo "Detected research PR by body content, posting /opencode plan"
              gh issue comment "$PARENT" --repo "$GITHUB_REPOSITORY" --body "/opencode plan this"
              echo "Waiting for plan PR creation and enabling auto-merge..."
              sleep 15
              PLAN_PR=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --json number,headRefName,createdAt \
                --jq 'map(select(.headRefName | test("opencode/issue'"$PARENT"'"))) | sort_by(.createdAt) | last | .number')
              if [ -n "$PLAN_PR" ] && [ "$PLAN_PR" != "null" ]; then
                echo "Enabling auto-merge on plan PR #$PLAN_PR"
                gh pr merge "$PLAN_PR" --repo "$GITHUB_REPOSITORY" --auto --merge
              else
                echo "No plan PR found for parent #$PARENT yet, skipping auto-merge"
              fi
            else
              echo "PR #$PR_NUM has opencode branch but unrecognized body, skipping"
            fi
          else
            echo "PR #$PR_NUM is neither Research nor Plan, skipping"
          fi
