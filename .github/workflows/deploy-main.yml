name: deploy-main
on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Inject git info into version.js
        run: |
          HASH=$(git rev-parse --short HEAD)
          DATE=$(git log -1 --format=%ad --date=format:'%Y-%m-%d')
          cat > src/version.js << EOF
          export const GIT_HASH = '$HASH';
          export const GIT_DATE = '$DATE';
          EOF

      - name: Deploy to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.MY_GITHUB_TOKEN }}
          publish_dir: .
          keep_files: false
