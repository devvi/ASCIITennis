<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCIITennis</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const COURT_LENGTH = 23.77;
const COURT_WIDTH = 10.97;
const NET_HEIGHT = 0.914;
const PLAYER_EYE_Y = 1.7;
const BALL_RADIUS = 0.05;

const GRAVITY = -0.04;
const BOUNCE_FACTOR = 0.6;
const SPIN_FACTOR = 0.003;
const AIR_RESISTANCE = 0.005;

const HIT_FLAT = 1;
const HIT_TOPSPIN = 2;
const HIT_SLICE = 3;
const HIT_LOB = 4;

const HIT_PARAMS = {
  [HIT_FLAT]: { speed: 0.55, arc: 0.0, spin: 0.0 },
  [HIT_TOPSPIN]: { speed: 0.45, arc: 0.6, spin: 0.8 },
  [HIT_SLICE]: { speed: 0.40, arc: -0.1, spin: -0.6 },
  [HIT_LOB]: { speed: 0.30, arc: 1.5, spin: 0.1 },
};

const BTN_UP = 0;
const BTN_DOWN = 1;
const BTN_LEFT = 2;
const BTN_RIGHT = 3;
const BTN_A = 4;
const BTN_B = 5;
const BTN_X = 6;
const BTN_Y = 7;

const STATE_MENU = "menu";
const STATE_SERVING = "serving";
const STATE_PLAYING = "playing";
const STATE_POINT_SCORED = "point_scored";
const STATE_GAME_OVER = "game_over";

const PLAYER_IDLE = "idle";
const PLAYER_MOVING = "moving";
const PLAYER_HITTING = "hitting";

const PLAYER_SPEED = 0.08;

const BALL_HELD = "held";
const BALL_IN_PLAY = "in_play";
const BALL_OUT = "out";
const BALL_NET = "net";
const BALL_BOUNCE = "bounce";

const POINTS = [0, 15, 30, 40];
const GAMES_TO_WIN_SET = 6;
const SETS_TO_WIN_MATCH = 2;

const SCREEN_W = 240;
const SCREEN_H = 136;
const FOV = 120;
const DEPTH_CHARS = " .:-=+*#%@";

const AI_EASY = {
  reaction_time: 20,
  accuracy: 0.5,
  aggression: 0.2,
  speed: 0.7,
};

const AI_HARD = {
  reaction_time: 5,
  accuracy: 0.9,
  aggression: 0.7,
  speed: 1.0,
};

const court = {
  lines: [],
  net: {},

  init() {
    this.lines = [
      { x1: -COURT_WIDTH/2, z1: 0, x2: COURT_WIDTH/2, z2: 0 },
      { x1: -COURT_WIDTH/2, z1: COURT_LENGTH, x2: COURT_WIDTH/2, z2: COURT_LENGTH },
      { x1: -COURT_WIDTH/2, z1: 0, x2: -COURT_WIDTH/2, z2: COURT_LENGTH },
      { x1: COURT_WIDTH/2, z1: 0, x2: COURT_WIDTH/2, z2: COURT_LENGTH },
      { x1: -COURT_WIDTH/2, z1: COURT_LENGTH/4, x2: COURT_WIDTH/2, z2: COURT_LENGTH/4 },
      { x1: -COURT_WIDTH/2, z1: 3*COURT_LENGTH/4, x2: COURT_WIDTH/2, z2: 3*COURT_LENGTH/4 },
      { x1: 0, z1: COURT_LENGTH/4, x2: 0, z2: 3*COURT_LENGTH/4 },
    ];

    this.net = {
      x1: -COURT_WIDTH/2, z1: COURT_LENGTH/2,
      x2: COURT_WIDTH/2, z2: COURT_LENGTH/2,
      height: NET_HEIGHT,
    };
  },

  is_in_bounds(x, z) {
    return x >= -COURT_WIDTH/2 && x <= COURT_WIDTH/2
      && z >= 0 && z <= COURT_LENGTH;
  },

  is_in_player_side(z) {
    return z < COURT_LENGTH / 2;
  },

  hits_net(x, z, prev_z, ball_height) {
    if (ball_height > NET_HEIGHT) return false;
    return (prev_z < COURT_LENGTH/2 && z >= COURT_LENGTH/2)
        || (prev_z > COURT_LENGTH/2 && z <= COURT_LENGTH/2);
  },
};

const camera = {
  x: 0, y: 0, z: 0,

  init(cx, cy, cz) {
    this.x = cx;
    this.y = cy;
    this.z = cz;
  },

  project(world_x, world_y, world_z) {
    const dz = world_z - this.z;
    if (dz <= 0.01) return null;

    const dx = world_x - this.x;
    const dy = this.y - world_y;

    const scale = FOV / dz;
    const sx = SCREEN_W / 2 + dx * scale;
    const sy = SCREEN_H / 2 - dy * scale;

    if (sx < -SCREEN_W*2 || sx > SCREEN_W*3) return null;
    if (sy < -SCREEN_H*2 || sy > SCREEN_H*3) return null;

    const depth = dz / (COURT_LENGTH * 1.5);
    return { sx, sy, depth };
  },

  depth_char(depth) {
    if (depth < 0) depth = 0;
    if (depth > 1) depth = 1;
    const idx = Math.floor(depth * (DEPTH_CHARS.length - 1));
    return DEPTH_CHARS[idx];
  },

  project_char(world_x, world_y, world_z) {
    const p = this.project(world_x, world_y, world_z);
    if (!p) return null;
    return { sx: p.sx, sy: p.sy, ch: this.depth_char(p.depth) };
  },

  draw_line(x1, y1, z1, x2, y2, z2) {
    const near = 0.02;
    if ((z1 - this.z <= near) && (z2 - this.z <= near)) return;

    if (z1 - this.z <= near) {
      const t = (near - (z1 - this.z)) / ((z2 - this.z) - (z1 - this.z) + 0.001);
      x1 = x1 + (x2 - x1) * t;
      y1 = y1 + (y2 - y1) * t;
      z1 = this.z + near;
    }
    if (z2 - this.z <= near) {
      const t = (near - (z2 - this.z)) / ((z1 - this.z) - (z2 - this.z) + 0.001);
      x2 = x2 + (x1 - x2) * t;
      y2 = y2 + (y1 - y2) * t;
      z2 = this.z + near;
    }

    const p1 = this.project(x1, y1, z1);
    const p2 = this.project(x2, y2, z2);
    if (!p1 || !p2) return;

    let steps = Math.max(1, Math.abs(p2.sx - p1.sx), Math.abs(p2.sy - p1.sy));
    if (steps > 50) steps = 50;
    const n = Math.floor(steps);

    for (let i = 0; i <= n; i++) {
      const t = i / steps;
      const sx = p1.sx + (p2.sx - p1.sx) * t;
      const sy = p1.sy + (p2.sy - p1.sy) * t;
      const depth = p1.depth + (p2.depth - p1.depth) * t;
      const ch = this.depth_char(depth);

      const ix = Math.floor(sx + 0.5);
      const iy = Math.floor(sy + 0.5);
      if (ix >= 0 && ix < SCREEN_W && iy >= 0 && iy < SCREEN_H) {
        printChar(ch, ix, iy);
      }
    }
  },

  draw_rect(x1, z1, x2, z2, y) {
    y = y || 0;
    this.draw_line(x1, y, z1, x2, y, z1);
    this.draw_line(x2, y, z1, x2, y, z2);
    this.draw_line(x2, y, z2, x1, y, z2);
    this.draw_line(x1, y, z2, x1, y, z1);
  },
};

const player = {
  new(is_ai) {
    return {
      x: 0,
      z: is_ai ? COURT_LENGTH - 2 : 3,
      state: PLAYER_IDLE,
      hit_timer: 0,
      swing_duration: 15,
      speed: PLAYER_SPEED,
      is_ai: is_ai || false,
    };
  },

  update(p) {
    if (p.hit_timer > 0) {
      p.hit_timer -= 1;
      if (p.hit_timer <= 0) {
        p.state = PLAYER_IDLE;
      }
    }
  },

  move(p, dx, dz) {
    const new_x = p.x + dx * p.speed;
    const new_z = p.z + dz * p.speed;
    const margin = 1.0;

    p.x = Math.max(-COURT_WIDTH/2 + margin, Math.min(COURT_WIDTH/2 - margin, new_x));
    p.z = Math.max(0.5, Math.min(COURT_LENGTH/2 - 0.5, new_z));
  },

  swing(p) {
    if (p.hit_timer > 0) return false;
    p.state = PLAYER_HITTING;
    p.hit_timer = p.swing_duration;
    return true;
  },

  can_hit(p, ball) {
    if (p.state !== PLAYER_IDLE) return false;
    const dx = p.x - ball.x;
    const dz = p.z - ball.z;
    const dy = ball.y;
    const dist = Math.sqrt(dx*dx + dz*dz + dy*dy);
    return dist < 1.5;
  },
};

const ball = {
  new() {
    return {
      x: 0, y: 1.0, z: 0,
      vx: 0, vy: 0, vz: 0,
      spin_x: 0, spin_z: 0,
      state: BALL_HELD,
      bounces: 0,
    };
  },

  update(b) {
    if (b.state !== BALL_IN_PLAY) return;

    const prev_z = b.z;

    b.vx = b.vx - b.vx * AIR_RESISTANCE + b.spin_x * SPIN_FACTOR;
    b.vz = b.vz - b.vz * AIR_RESISTANCE + b.spin_z * SPIN_FACTOR;
    b.vy = b.vy + GRAVITY;

    b.x = b.x + b.vx;
    b.y = b.y + b.vy;
    b.z = b.z + b.vz;

    if (b.y < BALL_RADIUS) {
      b.y = BALL_RADIUS;
      b.vy = -b.vy * BOUNCE_FACTOR;
      b.vx = b.vx * 0.8;
      b.vz = b.vz * 0.8;
      b.bounces += 1;
      b.state = BALL_BOUNCE;

      if (b.bounces > 2) {
        b.state = BALL_OUT;
      }
    }

    if (court.hits_net(b.x, b.z, prev_z, b.y)) {
      b.state = BALL_NET;
      return;
    }

    if (!court.is_in_bounds(b.x, b.z)) {
      if (b.bounces > 0) {
        b.state = BALL_OUT;
      }
    }

    if (b.z > COURT_LENGTH + 2) {
      b.state = BALL_OUT;
    }
    if (b.z < -2) {
      b.state = BALL_OUT;
    }
  },

  serve(b, from_x, from_z, target_x, target_z) {
    const dx = target_x - from_x;
    const dz = target_z - from_z;
    let dist = Math.sqrt(dx*dx + dz*dz);
    if (dist < 0.01) dist = 0.01;
    const serve_speed = 0.45;
    b.x = from_x;
    b.y = 1.5;
    b.z = from_z;
    b.vx = (dx / dist) * serve_speed;
    b.vz = (dz / dist) * serve_speed;
    b.vy = 1.2;
    b.spin_x = 0;
    b.spin_z = 0;
    b.bounces = 0;
    b.state = BALL_IN_PLAY;
  },

  hit(b, hit_x, hit_y, hit_z, target_x, target_z, hit_type) {
    const params = HIT_PARAMS[hit_type] || HIT_PARAMS[HIT_FLAT];

    const dx = target_x - hit_x;
    const dz = target_z - hit_z;
    let dist = Math.sqrt(dx*dx + dz*dz);
    if (dist < 0.01) dist = 0.01;

    const speed = params.speed;
    b.x = hit_x;
    b.y = hit_y;
    b.z = hit_z;
    b.vx = (dx / dist) * speed;
    b.vz = (dz / dist) * speed;
    b.vy = 1.5 + params.arc * 2;
    b.spin_x = Math.random() * params.spin * 2 - params.spin;
    b.spin_z = params.spin * 0.5;
    b.bounces = 0;
    b.state = BALL_IN_PLAY;
  },
};

const ai = {
  new_player(difficulty) {
    const p = player.new(true);
    p.ai_config = difficulty === "hard" ? AI_HARD : AI_EASY;
    p.reaction_counter = 0;
    p.target_x = p.x;
    p.target_z = p.z;
    p.has_served = false;
    return p;
  },

  update(ai_player, ball) {
    if (ai_player.hit_timer > 0) {
      ai_player.hit_timer -= 1;
      if (ai_player.hit_timer <= 0) {
        ai_player.state = PLAYER_IDLE;
      }
      return null;
    }

    const config = ai_player.ai_config;
    const court_center_x = 0;
    const base_z = COURT_LENGTH - 2;

    if (ball.state === BALL_IN_PLAY) {
      if (ball.vz < 0 && ball.z > COURT_LENGTH * 0.4) {
        if (ai_player.reaction_counter < config.reaction_time) {
          ai_player.reaction_counter += 1;
          ai_player.target_x = court_center_x;
          ai_player.target_z = base_z;
        } else {
          const relative_vz = -ball.vz;
          const rvz = relative_vz < 0.01 ? 0.01 : relative_vz;
          const time_to_reach_z = (ball.z - 2) / rvz;
          const predicted_x = ball.x + ball.vx * time_to_reach_z * 0.8;
          const jitter = (1 - config.accuracy) * 4;
          ai_player.target_x = predicted_x + (Math.random() - 0.5) * jitter;
          const depth_offset = (1 - config.aggression) * 2;
          ai_player.target_z = Math.max(COURT_LENGTH * 0.6, base_z - depth_offset);
        }
      } else {
        ai_player.reaction_counter = 0;
        const target_z_offset = (ball.z - COURT_LENGTH / 2) * 0.3;
        ai_player.target_z = base_z + target_z_offset;
        ai_player.target_x = court_center_x + ball.x * 0.5;
      }
    } else {
      ai_player.reaction_counter = 0;
      ai_player.target_x = court_center_x;
      ai_player.target_z = base_z;
    }

    const dx = ai_player.target_x - ai_player.x;
    const dz = ai_player.target_z - ai_player.z;
    const dist = Math.sqrt(dx*dx + dz*dz);

    const move_speed = config.speed * PLAYER_SPEED * 1.2;
    if (dist > 0.3) {
      const move_x = (dx / dist) * move_speed;
      const move_z = (dz / dist) * move_speed;
      ai_player.x += move_x;
      ai_player.z += move_z;
      const margin = 1.0;
      ai_player.x = Math.max(-COURT_WIDTH/2 + margin, Math.min(COURT_WIDTH/2 - margin, ai_player.x));
      ai_player.z = Math.max(COURT_LENGTH/2 + 0.5, Math.min(COURT_LENGTH - 0.5, ai_player.z));
      ai_player.state = PLAYER_MOVING;
    } else {
      ai_player.state = PLAYER_IDLE;
    }

    if (ball.state === BALL_IN_PLAY) {
      const can_reach = Math.abs(ball.x - ai_player.x) < 1.5
        && Math.abs(ball.z - ai_player.z) < 1.5
        && ball.y < 2.5 && ball.y > 0.1
        && ball.vz > 0;

      if (can_reach && ai_player.state === PLAYER_IDLE) {
        player.swing(ai_player);

        const r = Math.random();
        let hit_type;
        if (r < config.aggression) {
          hit_type = HIT_FLAT;
        } else if (r < config.aggression + 0.25) {
          hit_type = HIT_TOPSPIN;
        } else if (r < config.aggression + 0.45) {
          hit_type = HIT_SLICE;
        } else {
          hit_type = HIT_LOB;
        }

        const target_x = (Math.random() - 0.5) * COURT_WIDTH * (1.2 - config.accuracy * 0.6);
        const target_z = 1 + Math.random() * 4 * (1 - config.accuracy * 0.5);
        return { hit_type, target_x, target_z };
      }
    }

    return null;
  },
};

const scoring = {
  new() {
    return {
      points: [0, 0],
      games: [0, 0],
      sets: [0, 0],
      deuce: false,
      advantage: null,
    };
  },

  point_name(p) {
    if (p === 0) return "0";
    if (p === 1) return "15";
    if (p === 2) return "30";
    if (p === 3) return "40";
    return "40";
  },

  display(s) {
    if (s.deuce) {
      if (s.advantage === 0) return "Deuce\nAd Player";
      if (s.advantage === 1) return "Deuce\nAd AI";
      return "Deuce";
    }
    const p0 = this.point_name(s.points[0]);
    const p1 = this.point_name(s.points[1]);
    if (p0 === "40" && p1 === "40" && s.points[0] === s.points[1]) {
      return "Deuce";
    }
    return p0 + " - " + p1;
  },

  award_point(s, winner) {
    if (s.deuce) {
      if (s.advantage === null) {
        s.advantage = winner;
      } else if (s.advantage === winner) {
        s.deuce = false;
        s.advantage = null;
        s.points = [0, 0];
        return this.award_game(s, winner);
      } else {
        s.advantage = null;
      }
      return null;
    }

    const loser = 1 - winner;
    s.points[winner] += 1;
    const wp = s.points[winner];
    const lp = s.points[loser];

    if (wp >= 4 && wp - lp >= 2) {
      s.points = [0, 0];
      return this.award_game(s, winner);
    }

    if (wp >= 3 && lp >= 3) {
      s.deuce = true;
      s.advantage = null;
    }

    return null;
  },

  award_game(s, winner) {
    s.games[winner] += 1;

    if (s.games[winner] >= GAMES_TO_WIN_SET
      && s.games[winner] - s.games[1 - winner] >= 2) {
      return this.award_set(s, winner);
    }

    return "game";
  },

  award_set(s, winner) {
    s.games = [0, 0];
    s.sets[winner] += 1;

    if (s.sets[winner] >= SETS_TO_WIN_MATCH) {
      return "match";
    }

    return "set";
  },

  reset(s) {
    s.points = [0, 0];
    s.games = [0, 0];
    s.sets = [0, 0];
    s.deuce = false;
    s.advantage = null;
  },
};

const NUM_BUTTONS = 8;
let prev = new Array(NUM_BUTTONS).fill(false);
let curr = new Array(NUM_BUTTONS).fill(false);

const KEY_MAP = {
  "w": BTN_UP,
  "W": BTN_UP,
  "ArrowUp": BTN_UP,
  "s": BTN_DOWN,
  "S": BTN_DOWN,
  "ArrowDown": BTN_DOWN,
  "a": BTN_LEFT,
  "A": BTN_LEFT,
  "ArrowLeft": BTN_LEFT,
  "d": BTN_RIGHT,
  "D": BTN_RIGHT,
  "ArrowRight": BTN_RIGHT,
};

function onKeyDown(e) {
  const btn = KEY_MAP[e.key];
  if (btn !== undefined) {
    e.preventDefault();
    curr[btn] = true;
  }
}

function onKeyUp(e) {
  const btn = KEY_MAP[e.key];
  if (btn !== undefined) {
    e.preventDefault();
    curr[btn] = false;
  }
}

function onMouseDown(e) {
  e.preventDefault();
  curr[BTN_A] = true;
  curr[BTN_B] = true;
}

function onMouseUp(e) {
  e.preventDefault();
  curr[BTN_A] = false;
  curr[BTN_B] = false;
}

const input = {
  init(canvas) {
    window.addEventListener("keydown", onKeyDown);
    window.addEventListener("keyup", onKeyUp);
    canvas.addEventListener("mousedown", onMouseDown);
    canvas.addEventListener("mouseup", onMouseUp);
    canvas.addEventListener("contextmenu", (e) => e.preventDefault());
  },

  update() {
    for (let i = 0; i < NUM_BUTTONS; i++) {
      prev[i] = curr[i];
    }
  },

  pressed(btn_id) {
    return curr[btn_id] && !prev[btn_id];
  },

  held(btn_id) {
    return curr[btn_id];
  },

  released(btn_id) {
    return !curr[btn_id] && prev[btn_id];
  },

  get_movement() {
    let dx = 0, dz = 0;
    if (this.held(BTN_LEFT)) dx = -1;
    if (this.held(BTN_RIGHT)) dx = 1;
    if (this.held(BTN_UP)) dz = -1;
    if (this.held(BTN_DOWN)) dz = 1;
    return [dx, dz];
  },

  get_shot_type() {
    if (!this.pressed(BTN_B)) return null;

    if (this.held(BTN_UP)) return HIT_TOPSPIN;
    if (this.held(BTN_DOWN)) return HIT_SLICE;
    if (this.held(BTN_LEFT) || this.held(BTN_RIGHT)) return HIT_LOB;

    return HIT_FLAT;
  },

  get_serve() {
    return this.pressed(BTN_B) || this.pressed(BTN_A);
  },
};

const SCALE = 4;
let ctx;

function initRender(canvas) {
  canvas.width = SCREEN_W * SCALE;
  canvas.height = SCREEN_H * SCALE;
  ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
}

function beginFrame() {
  ctx.setTransform(SCALE, 0, 0, SCALE, 0, 0);
  ctx.font = '7px "Courier New", monospace';
  ctx.textBaseline = "top";
  ctx.textAlign = "start";
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
  ctx.fillStyle = "#0f0";
}

function printChar(ch, x, y) {
  ctx.fillText(ch, x, y);
}

function print(str, x, y) {
  ctx.fillText(str, x, y);
}

const render = {
  court() {
    for (const line of court.lines) {
      camera.draw_line(line.x1, 0, line.z1, line.x2, 0, line.z2);
    }
  },

  net() {
    const half = COURT_WIDTH / 2;
    const net_z = COURT_LENGTH / 2;
    const posts = 6;
    for (let i = 0; i <= posts; i++) {
      const t = i / posts;
      const nx = -half + half * 2 * t;
      const nz = net_z;
      const ny0 = 0;
      const ny1 = NET_HEIGHT;
      camera.draw_line(nx, ny0, nz, nx, ny1, nz);
    }
    camera.draw_line(-half, NET_HEIGHT, net_z, half, NET_HEIGHT, net_z);
  },

  player(p, label) {
    if (p.z < camera.z && camera.z - p.z > 2) {
      const dx = p.x - camera.x;
      const dz = p.z - camera.z;
      if (dx * dx + dz * dz > 100) return;
    }
    const pc1 = camera.project_char(p.x, 1.2, p.z);
    if (pc1) {
      print(label, pc1.sx - 2, pc1.sy - 4);
    }
    const pc2 = camera.project_char(p.x, 0.1, p.z);
    if (pc2) {
      print(pc2.ch, pc2.sx, pc2.sy);
    }
  },

  ball(b) {
    if (b.state === "in_play" || b.state === "bounce") {
      const pc = camera.project_char(b.x, b.y, b.z);
      if (pc) {
        print("o", pc.sx, pc.sy);
        const pc2 = camera.project_char(b.x, 0, b.z);
        if (pc2) {
          print(pc2.ch, pc2.sx, pc2.sy);
        }
      }
    }
  },

  hud(score) {
    const display = scoring.display(score);
    print("SCORE", 2, 1);
    print("Player", 2, 9);
    print("AI", 2, 17);
    print(display, 50, 1);
    print("Games " + score.games[0] + "-" + score.games[1], 2, 25);
    if (score.sets[0] > 0 || score.sets[1] > 0) {
      print("Sets " + score.sets[0] + "-" + score.sets[1], 2, 33);
    }
  },

  menu(selected_diff) {
    print("  ____  _   _   ___   _   _   _____   ___   _   _   ____", 8, 15);
    print(" / ___|| | | | / _ \\ | \\ | | | ____| / _ \\ | \\ | | / ___|", 8, 23);
    print(" \\___ \\| |_| || | | ||  \\| | |  _|  | | | ||  \\| | \\___ \\", 8, 31);
    print("  ___) |  _  || |_| || |\\  | | |___ | |_| || |\\  |  ___) |", 8, 39);
    print(" |____/|_| |_| \\___/ |_| \\_| |_____| \\___/ |_| \\_| |____/", 8, 47);
    print("Select AI Difficulty:", 50, 70);
    print((selected_diff === 1 ? " > " : "   ") + "EASY", 55, 80);
    print((selected_diff === 2 ? " > " : "   ") + "HARD", 55, 90);
    print("Click to play", 55, 110);
  },

  game_over(winner) {
    print("  ____    _    __  __ _____ ", 35, 30);
    print(" / ___|  / \\  |  \\/  | ____|", 35, 38);
    print("| |  _  / _ \\ | |\\/| |  _|  ", 35, 46);
    print("| |_| |/ ___ \\| |  | | |___ ", 35, 54);
    print(" \\____/_/   \\_\\_|  |_|_____|", 35, 62);
    print(winner + " wins the match!", 55, 80);
    print("Click to play again", 48, 95);
  },
};

let game_state;
let selected_diff;
let human_player;
let ai_player;
let ball_obj;
let score;
let server;
let point_winner;
let point_timer;
let rally_hits;
let serve_timer;

function init_game() {
  court.init();

  game_state = STATE_MENU;
  selected_diff = 1;

  human_player = player.new(false);
  ai_player = null;
  ball_obj = ball.new();
  score = scoring.new();
  server = 0;
  point_winner = null;
  point_timer = 0;
  rally_hits = 0;
  serve_timer = 0;
}

function start_match() {
  ai_player = ai.new_player(selected_diff === 1 ? "easy" : "hard");

  human_player.x = 0;
  human_player.z = 3;
  human_player.state = PLAYER_IDLE;
  human_player.hit_timer = 0;

  ai_player.x = 0;
  ai_player.z = COURT_LENGTH - 2;
  ai_player.state = PLAYER_IDLE;
  ai_player.hit_timer = 0;

  score = scoring.new();
  server = 0;
  rally_hits = 0;

  game_state = STATE_SERVING;
  setup_serve();
}

function setup_serve() {
  ball_obj = ball.new();
  serve_timer = 30;

  if (server === 0) {
    human_player.x = (Math.random() - 0.5) * 2;
    human_player.z = 2;
    ball_obj.x = human_player.x;
    ball_obj.z = human_player.z;
  } else {
    ai_player.x = (Math.random() - 0.5) * 2;
    ai_player.z = COURT_LENGTH - 2;
    ball_obj.x = ai_player.x;
    ball_obj.z = ai_player.z;
  }
  ball_obj.y = 1.0;
  ball_obj.state = BALL_HELD;
}

function do_serve() {
  if (server === 0) {
    const serve_target_x = (Math.random() - 0.5) * COURT_WIDTH * 0.8;
    const serve_target_z = COURT_LENGTH * 0.7;
    ball.serve(ball_obj, human_player.x, human_player.z, serve_target_x, serve_target_z);
  } else {
    const serve_target_x = (Math.random() - 0.5) * COURT_WIDTH * 0.8;
    const serve_target_z = 1 + Math.random() * 3;
    ball.serve(ball_obj, ai_player.x, ai_player.z, serve_target_x, serve_target_z);
  }
  game_state = STATE_PLAYING;
  rally_hits = 0;
}

function resolve_point(winner) {
  const result = scoring.award_point(score, winner);
  point_winner = winner;
  point_timer = 60;
  game_state = STATE_POINT_SCORED;

  if (result === "game") {
    server = 1 - server;
  }

  if (result === "match") {
    game_state = STATE_GAME_OVER;
  }
}

function update_menu() {
  if (input.pressed(BTN_UP)) {
    selected_diff = Math.max(1, selected_diff - 1);
  }
  if (input.pressed(BTN_DOWN)) {
    selected_diff = Math.min(2, selected_diff + 1);
  }
  if (input.pressed(BTN_B)) {
    start_match();
  }
}

function update_serving() {
  serve_timer -= 1;

  if (server === 0) {
    if (input.get_serve()) {
      do_serve();
    }
  } else {
    if (serve_timer <= 0) {
      do_serve();
    }
  }
}

function update_playing() {
  const [dx, dz] = input.get_movement();
  player.move(human_player, dx, dz);
  player.update(human_player);

  const shot = input.get_shot_type();
  if (shot && player.can_hit(human_player, ball_obj)) {
    if (player.swing(human_player)) {
      const target_x = (Math.random() - 0.5) * COURT_WIDTH * 0.8;
      const target_z = COURT_LENGTH - 1 - Math.random() * 3;
      ball.hit(ball_obj, human_player.x, 1.0, human_player.z, target_x, target_z, shot);
      rally_hits += 1;
    }
  }

  const ai_action = ai.update(ai_player, ball_obj);
  if (ai_action) {
    ball.hit(ball_obj, ai_player.x, 1.0, ai_player.z, ai_action.target_x, ai_action.target_z, ai_action.hit_type);
    rally_hits += 1;
  }
  player.update(ai_player);

  ball.update(ball_obj);

  if (ball_obj.state === BALL_OUT) {
    if (ball_obj.z < COURT_LENGTH / 2) {
      resolve_point(1);
    } else {
      resolve_point(0);
    }
  } else if (ball_obj.state === BALL_NET) {
    if (ball_obj.z < COURT_LENGTH / 2) {
      resolve_point(1);
    } else {
      resolve_point(0);
    }
  } else if (ball_obj.z > COURT_LENGTH + 1) {
    resolve_point(0);
  } else if (ball_obj.z < -1) {
    resolve_point(1);
  }
}

function update_point_scored() {
  point_timer -= 1;
  if (point_timer <= 0) {
    game_state = STATE_SERVING;
    setup_serve();
  }
}

function update_game_over() {
  if (input.pressed(BTN_B)) {
    init_game();
  }
}

function draw_game() {
  beginFrame();

  if (game_state === STATE_MENU) {
    render.menu(selected_diff);
    return;
  }

  camera.init(human_player.x, PLAYER_EYE_Y, human_player.z);
  render.court();
  render.net();

  if (ball_obj) {
    render.ball(ball_obj);
  }

  render.player(human_player, "P");
  if (ai_player) {
    render.player(ai_player, "A");
  }

  render.hud(score);

  if (game_state === STATE_SERVING) {
    if (server === 0) {
      print("Your serve - Click", 50, 120);
    } else {
      print("AI serving...", 60, 120);
    }
  }

  if (game_state === STATE_POINT_SCORED) {
    const name = point_winner === 0 ? "Player" : "AI";
    print("Point: " + name, 70, 110);
  }

  if (game_state === STATE_GAME_OVER) {
    const winner = score.sets[0] > score.sets[1] ? "Player" : "AI";
    render.game_over(winner);
  }
}

function gameLoop() {
  input.update();

  if (game_state === STATE_MENU) {
    update_menu();
  } else if (game_state === STATE_SERVING) {
    update_serving();
  } else if (game_state === STATE_PLAYING) {
    update_playing();
  } else if (game_state === STATE_POINT_SCORED) {
    update_point_scored();
  } else if (game_state === STATE_GAME_OVER) {
    update_game_over();
  }

  draw_game();
  requestAnimationFrame(gameLoop);
}

const canvas = document.getElementById("game");
initRender(canvas);
input.init(canvas);
init_game();
requestAnimationFrame(gameLoop);
</script>
